[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "advanced-rvc-inference"
version = "0.1.0"
description = "Advanced RVC Inference - A state-of-the-art web UI for rapid and effortless inference."
readme = "README.md"
requires-python = ">=3.9,<3.14"
license = {file = "LICENSE"}
authors = [
    {name = "ArkanDash", email = "your-email@example.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Build Tools",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "wget",
    "PyYAML>=6.0.2",
    "tiktoken",
    "hyperpyyaml",
    "torch>=2.0.0",
    "sortedcontainers",
    "torchvision>=0.15.0",
    "torchaudio>=2.0.0",
    "julius==0.2.7",
    "pip>=23.3",
    "wheel",
    "omegaconf>=2.2.3",
    "httpx>=0.27.2",
    "contextlib2>=21.6.0",
    "faiss-cpu>=1.7.3",
    "audio-separator",
    "audiomentations>=0.31.0",
    "auraloss>=0.4.0",
    "noisereduce>=3.0.2",
    "pystoi>=0.4.1",
    "pyworld>=0.3.4",
    "torchlibrosa>=0.1.0",
    "torchmetrics>=0.11.4",
    "torchseg>=0.0.1a1",
    "transformers>=4.49.0",
    "scikit-learn>=1.5.1",
    "einops>=0.8.0",
    "ml_collections>=0.1.1",
    "segmentation-models-pytorch>=0.5.0",
    "huggingface-hub>=0.34.0",
    "librosa>=0.10.2",
    "praat-parselmouth>=0.4.4",
    "soundfile>=0.13.0",
    "pedalboard>=0.8.9",
    "numpy>=1.25.2,<2.0.0",
    "numba>=0.57.0",
    "scipy>=1.15.0",
    "matplotlib>=3.7.2",
    "gradio>=5.23.3,<6.0.0",
    "requests>=2.32.3",
    "aiohttp",
    "pysrt",
    "yt-dlp",
    "edge-tts>=7.2.0",
    "ffmpy>=0.3.1",
    "ffmpeg-python>=0.2.0",
    "beautifulsoup4>=4.12.3",
    "pyopencl>=2023.1",
    "tensorboard>=2.17.1",
    "onnx>=1.16.2",
    "onnxslim",
    "onnx2torch>=1.5.15",
    "pycryptodome>=3.9.6,<4.0.0",
    "sounddevice>=0.5.2",
    "webrtcvad-wheels>=2.0.14",
    "audioread>=3.0.1",
    "resampy>=0.4.3",
    "spectralcluster>=0.2.22",
    "rich>=13.0.0",
    "click>=8.1.7",
    "colorama>=0.4.6",
    "tqdm>=4.66.5",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "black",
    "flake8",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/ArkanDash/Advanced-RVC-Inference"
Repository = "https://github.com/ArkanDash/Advanced-RVC-Inference"
Issues = "https://github.com/ArkanDash/Advanced-RVC-Inference/issues"

[project.scripts]
advanced-rvc-inference = "advanced_rvc_inference.app:main"

[tool.setuptools.packages.find]
include = ["advanced_rvc_inference*"]

[tool.setuptools.package-data]
advanced_rvc_inference = [
    "assets/**/*",
    "rvc/**/*",
    "tabs/**/*",
    "lib/**/*",
    "models/**/*",
    "uvr/**/*",
]
